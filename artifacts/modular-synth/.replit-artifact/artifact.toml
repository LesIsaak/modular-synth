kind = "web"
previewPath = "/"
title = "Modular Synthesizer"
version = "1.0.0"
id = "artifacts/modular-synth"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21840

[services.development]
run = "pnpm --filter @workspace/modular-synth run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/modular-synth", "run", "build" ]
publicDir = "artifacts/modular-synth/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21840"
BASE_PATH = "/"
